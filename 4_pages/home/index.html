<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>P.A.S.S</title>
    <link rel="icon" href="/pumex/1_assets/1_image/favicon.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../3_components/1_header/header.css">
    <link rel="stylesheet" href="../../2_common/1_css/color.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div id="loading-container">
        <div class="spinner"></div>
        <div class="loading-msg">데이터를 불러오는 중...</div>
    </div>

    <main class="dashboard-shell">

        <section id="sales-dashboard-view" class="sales-dashboard" aria-label="영업부 대시보드">
            <header class="dashboard-hero">
                <div>
                    <p class="dashboard-eyebrow">Sales Dashboard</p>
                    <h1 id="dashboard-title" class="dashboard-title">
                        <span id="sales-user-display">담당자</span>님, 확인이 필요한 업무가
                        <strong id="sales-total-need">0건</strong> 있습니다.
                    </h1>
                </div>
            </header>

            <section class="summary-card-grid" aria-label="업무 요약">
                <article class="summary-card" data-status="passport">
                    <div class="summary-icon passport-icon" aria-hidden="true">
                        <img src="/pumex/1_assets/1_image/PASSPORT.png" alt="">
                    </div>
                    <div class="summary-content">
                        <h2>여권 미접수</h2>
                        <strong><span id="sales-summary-passport-count">0</span>건</strong>
                        <p><span class="dot dot-warning"></span>확인 필요</p>
                    </div>
                </article>

                <article class="summary-card" data-status="insurance">
                    <div class="summary-icon insurance-icon" aria-hidden="true">
                        <img src="/pumex/1_assets/1_image/INSURANCE.png" alt="">
                    </div>
                    <div class="summary-content">
                        <h2>보험가입서 미전달</h2>
                        <strong><span id="sales-summary-insurance-count">0</span>건</strong>
                        <p><span class="dot dot-warning"></span>마감 임박</p>
                    </div>
                </article>

                <article class="summary-card" data-status="storage">
                    <div class="summary-icon storage-icon" aria-hidden="true">
                        <img src="/pumex/1_assets/1_image/STORAGE.png" alt="">
                    </div>
                    <div class="summary-content">
                        <h2>보관 중</h2>
                        <strong><span id="sales-summary-storage-count">0</span>건</strong>
                        <p><span class="dot dot-info"></span>전체 기준</p>
                    </div>
                </article>

                <article class="summary-card" data-status="console">
                    <div class="summary-icon console-icon" aria-hidden="true">
                        <img src="/pumex/1_assets/1_image/SHIP.png" alt="">
                    </div>
                    <div class="summary-content">
                        <h2>콘솔 대기</h2>
                        <strong><span id="sales-summary-console-count">0</span>건</strong>
                        <p><span class="dot dot-info"></span>전체 기준</p>
                    </div>
                </article>
            </section>

            <section class="dashboard-detail-grid" aria-label="상세 업무 리스트">
                <div class="dashboard-card">
                    <h2 class="card-title">여권 미접수 <span id="passport-count" class="count-badge"></span></h2>
                    <table class="modern-table sales-passport">
                        <thead><tr><th>서류마감</th><th>고객명</th><th>국가</th><th>업무담당</th></tr></thead>
                        <tbody id="passport-table-body"></tbody>
                    </table>
                </div>

                <div class="dashboard-card">
                    <h2 class="card-title">보험가입서 미전달 <span id="insurance-count" class="count-badge"></span></h2>
                    <table class="modern-table sales-insurance">
                        <thead><tr><th>입항일</th><th>고객명</th><th>국가</th><th>업무담당</th></tr></thead>
                        <tbody id="insurance-table-body"></tbody>
                    </table>
                </div>

                <div class="dashboard-card">
                    <h2 class="card-title">보관 중 <span id="storage-count" class="count-badge"></span></h2>
                    <table class="modern-table sales-storage">
                        <thead><tr><th>포장일</th><th>고객명</th><th>국가</th><th>업무담당</th></tr></thead>
                        <tbody id="storage-table-body"></tbody>
                    </table>
                </div>

                <div class="dashboard-card">
                    <h2 class="card-title">콘솔 대기 <span id="console-count" class="count-badge"></span></h2>
                    <table class="modern-table sales-console">
                        <thead><tr><th>POE</th><th>포장일</th><th>CBM</th><th>고객명</th><th>영업담당</th><th>업무담당</th></tr></thead>
                        <tbody id="console-table-body"></tbody>
                    </table>
                </div>
            </section>
        </section>

        <section id="ops-dashboard-view" class="dashboard-detail-grid" aria-label="업무부 대시보드">
            <div class="dashboard-card">
                <h2 class="card-title">여권 수취 필요 <span id="ops-passport-count" class="count-badge"></span></h2>
                <table class="modern-table ops-passport">
                    <thead><tr><th>서류 마감일</th><th>고객명</th><th>영업담당</th></tr></thead>
                    <tbody id="ops-passport-body"></tbody>
                </table>
            </div>

            <div class="dashboard-card">
                <h2 class="card-title">2일 이내 마감 <span class="loading-text">(공휴일 제외)</span> <span id="ops-deadline-count" class="count-badge"></span></h2>
                <table class="modern-table ops-documentcut">
                    <thead><tr><th>서류 마감일</th><th>고객명</th><th>컨작업일정</th></tr></thead>
                    <tbody id="ops-deadline-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="../../2_common/2_js/loading.js"></script>
    <script src="../../2_common/2_js/login.js"></script>
    <script src="./sales.js"></script>
    <script src="./ops.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const loadingContainer = document.getElementById('loading-container');
            const username = localStorage.getItem('username');

            if (!username) {
                alert("로그인 정보가 없습니다.");
                if (typeof logout === 'function') logout();
                else location.href = 'https://arrrbang.github.io/pumex/index.html';
                return;
            }

            const salesGroup = ['salea', 'saleb', 'salek', 'oh', 'eric', 'kbs', 'pjs', 'jackson', 'crjung', 'sk'];
            const opsGroup   = ['admin', 'opere', 'opero', 'operd'];

            try {
                if (salesGroup.includes(username)) {
                    await initSalesDashboard(username);
                    document.getElementById('sales-dashboard-view').style.display = 'block';
                } else if (opsGroup.includes(username)) {
                    await initOpsDashboard(username);
                    document.getElementById('ops-dashboard-view').style.display = 'grid';
                } else {
                    document.querySelector('.dashboard-shell').innerHTML = '<h1 class="dashboard-title">DASHBOARD 준비중...</h1>';
                }
            } catch (e) {
                console.error(e);
                alert("데이터 로딩 중 오류 발생: " + e.message);
            } finally {
                loadingContainer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
