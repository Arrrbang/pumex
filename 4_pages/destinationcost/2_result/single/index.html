<section id="resultSection" class="result-section" hidden>
  <div class="result-container container">
    <div id="tableWrap" class="table-wrap"></div>
  </div>

  <section id="currencySection" class="sticky-currency-bar" hidden>
    <div class="container currency-bar">
      
      <div class="summary-left-group">
        <div id="collapsedSummary" class="summary-info-wrapper" hidden>
          <div class="summary-text-container">
            <div class="summary-line"><span id="sumRegion">-</span>, <span id="sumCountry">-</span></div>
            <div class="summary-line"><span id="sumCbmType">-</span></div>
          </div>
          <div class="summary-partner-container"><span id="sumCompany">-</span></div>
        </div>
      </div>

      <div class="summary-right-group">
        <span id="totalDisplayOne" class="header-total">0</span>
        
        <div class="currency-controls-wrapper">
          <span id="currencyRate" class="currency-rate">-</span>
          <select id="currencySelect" class="dropdown-select currency-select"></select>
        </div>
      </div>

    </div>
  </section>
</section>
