<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>도착지 비용 조회 (검색 메인)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../../2_common/1_css/common.css" />
  <link rel="stylesheet" href="../../../2_common/1_css/color.css" />
  <link rel="stylesheet" href="../2_result/render_resulttable.css">
  <link rel="stylesheet" href="../2_result/single/bottom-bar/bottom_bar.css">
  <link rel="stylesheet" href="../2_result/compare/bottom-bar/bottom_bar.css">
  <link rel="stylesheet" href="./search.css" />
  
</head>

<body>
<div id="header-placeholder"></div>

<main class="app-shell">
  <div class="app-main">

    <section class="left-pane">
      <div id="mpkMap" class="map-canvas" aria-label="지도 영역">
        <div class="map-placeholder">지도(Leaflet)가 여기에 표시됩니다.</div>
      </div>
    </section>

    <section class="right-pane">
      <div class="dropdown-container">
        <label class="dropdown-label" for="countryCombo">국가/지역 선택</label>
        <div class="combo-line">
          <div class="combo" id="countryCombo">
            <input type="text" placeholder="국가 선택" autocomplete="off">
            <div class="list"></div>
          </div>
        </div>
        <div class="combo-line">
          <div class="combo" id="regionCombo">
            <input type="text" placeholder="배송 지역 선택" autocomplete="off" disabled>
            <div class="list"></div>
          </div>
        </div>
      </div>

      <div class="combo-line">
        <div class="cost-button-container" id="cost-button-container" aria-label="비용 관련 동작 버튼">
          <button id="costCheck" class="cost-check-type-btn" type="button">비용 조회</button>
        </div>
      </div>

      <div class="one partner" id="one-partner">
        <div class="dropdown-container">
          <label class="dropdown-label" for="companyCombo">파트너/POE/화물타입 선택</label>
          <div class="combo-line">
            <div class="combo" id="companyCombo">
              <input type="text" placeholder="파트너 선택" autocomplete="off" disabled>
              <div class="list"></div>
            </div>
          </div>
          <div class="combo-line">
            <div class="combo" id="poeCombo">
              <input type="text" placeholder="POE 선택" autocomplete="off" disabled>
              <div class="list"></div>
            </div>
          </div>
          <div class="combo-line">
            <div class="combo" id="cargoTypeCombo">
              <input type="text" placeholder="화물 타입 선택" autocomplete="off" disabled />
              <div class="list"></div>
            </div>
          </div>
        </div>

        <div class="dropdown-container">
          <label class="dropdown-label" for="cargoTypeSelect">컨테이너 타입/CBM 선택</label>
          <div class="combo-line">
            <div class="combo" id="typeCombo">
              <input type="text" placeholder="20FT / 40HC / CONSOLE" autocomplete="off" disabled>
              <div class="list"></div>
            </div>
          </div>
          <div class="combo-line">
            <div class="combo" id="cbmCombo_Wrapper">
              <input type="text" id="cbmSelect" placeholder="CBM 선택" autocomplete="off">
              <div class="list"></div>
            </div>
          </div>

          <div class="action-row center show revealed">
            <button id="btnFetch" class="primary-btn"><span class="label">조회</span></button>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>


<div id="single-result-placeholder"></div>
<div id="compare-result-placeholder"></div>

<script src="../../../2_common/3_api/api.js"></script>
<script src="../../../2_common/2_js/loading.js"></script>

<script src="../2_result/render_table.js"></script>
<script src="../2_result/single/bottom-bar/bottom_bar.js"></script> 
<script src="../2_result/compare/bottom-bar/bottom_bar.js"></script> 
<script src="../2_result/single/single.js"></script>
<script src="../2_result/compare/compare_controller.js"></script>

<script src="../../../3_components/4_currency-converter/currency-converter.js"></script>
<script src="./main.js"></script>
<script src="../../../3_components/2.Floating_box/Floating_loader.js"></script>

</body>
</html>
