<div id="trcModalOverlay" class="sos-modal-overlay" style="display: none;">
    <div class="sos-modal-window" style="max-width: 420px;">
        <div class="sos-modal-header">
            <h3>🚛 내륙 운송료 자동 계산</h3>
            <button id="btnTrcClose" class="sos-modal-close">&times;</button>
        </div>
        <div class="sos-modal-body">
            <div class="sos-field">
                <label>출발지 (공장/창고)</label>
                <input type="text" id="trcStartAddr" placeholder="클릭하여 출발지 주소 검색" readonly style="cursor: pointer;">
            </div>
            
            <div class="sos-field">
                <label>도착지 (항구/터미널)</label>
                <select id="trcEndSelect" style="margin-bottom: 5px;">
                    <option value="">-- 도착지 선택 또는 검색 --</option>
                    <option value="부산광역시 강서구 신항남로 330">부산신항 (미국, 유럽 등 장거리)</option>
                    <option value="부산광역시 남구 신선로 294">부산북항 (아시아, 인도네시아 등 단거리)</option>
                    <option value="인천 연수구 인천신항대로 707">인천항</option>
                    <option value="custom">🔍 직접 주소 검색창 열기...</option>
                </select>
                <input type="text" id="trcEndAddr" placeholder="도착지 주소가 여기에 입력됩니다" readonly style="display: none;">
            </div>

            <div class="sos-field">
                <label>컨테이너/작업 타입</label>
                <select id="trcTypeSelect">
                    <option value="cost20">20FT (안전운임 기준)</option>
                    <option value="cost40">40FT/40HC (안전운임 기준)</option>
                    <option value="console">CONSOLE (68CBM 기준)</option>
                </select>
            </div>
            
            <button id="btnTrcApply" class="btn-primary" style="width: 100%; margin-top: 15px; padding: 12px;">거리 계산 및 운임 적용하기</button>
        </div>
    </div>
</div>
