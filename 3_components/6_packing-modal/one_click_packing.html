<div id="packingModalOverlay" class="sos-modal-overlay" style="display: none;">
    <div class="sos-modal-window" style="max-width: 420px;">
        <div class="sos-modal-header">
            <h3>📦 지방 포장비 자동 계산</h3>
            <button id="btnPackingClose" class="sos-modal-close">&times;</button>
        </div>
        <div class="sos-modal-body">
            <div class="sos-field">
                <label>포장 파트너 선택</label>
                <select id="packingPartnerSelect">
                    <option value="yesg2m">예스지투엠 (YESG2M)</option>
                    <option value="hansol">한솔로지스틱스 (HANSOL)</option>
                </select>
            </div>
            <div class="sos-field">
                <label>포장지 주소 (도로명 / 지번)</label>
                <input type="text" id="packingAddressInput" placeholder="클릭하여 주소 검색" readonly style="cursor: pointer;">
            </div>
            <div class="sos-field">
                <label>적용 CBM (자동 연동)</label>
                <input type="text" id="packingCbmInput" readonly style="background-color: var(--mint-white); color: var(--deep-teal); font-weight: 700;">
            </div>
            
            <button id="btnPackingApply" class="btn-primary" style="width: 100%; margin-top: 15px; padding: 12px;">비용 계산 및 적용하기</button>
        </div>
    </div>
</div>
